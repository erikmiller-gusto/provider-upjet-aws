apiVersion: s3control.aws.upbound.io/v1beta1
kind: AccessGrantsLocation
metadata:
  annotations:
    meta.upbound.io/example-id: s3control/v1beta1/accessgrantslocation
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    iamRoleArnSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    locationScope: s3://
    region: us-west-1

---

apiVersion: s3control.aws.upbound.io/v1beta1
kind: AccessGrantsInstance
metadata:
  annotations:
    meta.upbound.io/example-id: s3control/v1beta1/accessgrantslocation
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    region: us-west-1
